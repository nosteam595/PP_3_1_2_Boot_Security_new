<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование пользователя</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            background-color: #f9f9f9;
        }
        .form-group { width: 350px; margin-bottom: 15px; }
        .form-row { display: flex; justify-content: space-between; align-items: flex-start; }
        label.main-label { font-weight: bold; margin-right: 10px; margin-top: 5px; }
        input[type="text"], input[type="email"], input[type="number"], input[type="password"] {
            width: 200px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .roles-container { width: 200px; display: flex; flex-direction: column; gap: 5px; }
        .role-item { display: flex; align-items: center; font-size: 14px; }
        .role-item input { width: auto; margin-right: 8px; }
        .input-error { border: 1px solid #d9534f; background-color: #fff6f6; }
        .error-message { display: block; text-align: right; font-size: 11px; color: #d9534f; margin-top: 4px; }
        button {
            width: 350px; padding: 10px; cursor: pointer; background-color: #f0f0f0;
            border: 1px solid #ccc; border-radius: 4px; font-weight: bold; margin-top: 10px;
        }
        button:hover { background-color: #e0e0e0; }
    </style>
</head>
<body>

<h2>Редактирование пользователя</h2>

<form th:action="@{/users/update}" th:object="${user}" method="POST">
    <!-- CSRF и ID -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <input type="hidden" th:field="*{id}" />

    <!-- Имя -->
    <div class="form-group">
        <div class="form-row">
            <label class="main-label">Имя:</label>
            <input type="text" th:field="*{firstName}" th:classappend="${#fields.hasErrors('firstName')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
    </div>

    <!-- Фамилия -->
    <div class="form-group">
        <div class="form-row">
            <label class="main-label">Фамилия:</label>
            <input type="text" th:field="*{lastName}" th:classappend="${#fields.hasErrors('lastName')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
    </div>

    <!-- Email -->
    <div class="form-group">
        <div class="form-row">
            <label class="main-label">Email:</label>
            <input type="email" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>

    <!-- Возраст -->
    <div class="form-group">
        <div class="form-row">
            <label class="main-label">Возраст:</label>
            <input type="number" th:field="*{age}" th:classappend="${#fields.hasErrors('age')} ? 'input-error' : ''" />
        </div>
        <span class="error-message" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></span>
    </div>

    <!-- Пароль (необязательный при редактировании) -->
    <div class="form-group">
        <div class="form-row">
            <label class="main-label">Пароль:</label>
            <input type="password" th:field="*{password}" placeholder="Оставьте пустым, чтобы не менять" />
        </div>
    </div>

    <!-- Роли -->
    <div class="form-group">
        <div class="form-row">
            <label class="main-label">Роли:</label>
            <div class="roles-container">
                <div th:each="role : ${allRoles}" class="role-item">
                    <input type="checkbox" name="listRoles"
                           th:value="${role.id}"
                           th:id="${'role_' + role.id}"
                           th:checked="${user.roles.contains(role)}" />
                    <label th:for="${'role_' + role.id}" th:text="${role.name.replace('ROLE_', '')}"></label>
                </div>
            </div>
        </div>
    </div>

    <button type="submit">Обновить данные</button>
</form>

<a th:href="@{/users}" style="margin-top: 20px; text-decoration: none; color: #007bff;">← Назад к списку</a>

</body>
</html>
