<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        .alert {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
        }
        .error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .logout { background: #ecfdf5; color: #059669; border: 1px solid #d1fae5; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #764ba2;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #5a3782; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Вход в систему</h2>

    <!-- Ошибки -->
    <div th:if="${param.error}" class="alert error">
        Неверный логин или пароль
    </div>

    <!-- Успешный выход -->
    <div th:if="${param.logout}" class="alert logout">
        Вы успешно вышли
    </div>

    <form th:action="@{/process_login}" method="post">
        <div class="form-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" placeholder="Введите логин" required autofocus />
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" required />
        </div>

        <button type="submit">Войти</button>
    </form>
</div>

</body>
</html>
