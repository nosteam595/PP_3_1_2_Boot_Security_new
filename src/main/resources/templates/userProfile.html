<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }
        .profile-card {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .profile-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h2 { color: #333; margin: 0; }
        .info-group {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #fafafa;
        }
        .label { font-weight: bold; color: #666; }
        .value { color: #2c3e50; }
        .roles-badge {
            background-color: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-left: 5px;
        }
        .actions {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .btn-logout {
            width: 100%;
            padding: 12px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-logout:hover { background-color: #c9302c; }
        .btn-back {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            transition: background 0.3s;
            box-sizing: border-box;
        }
        .btn-back:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="profile-header">
        <h2>Личный кабинет</h2>
    </div>

    <!-- Полная информация о пользователе -->
    <div class="info-group">
        <span class="label">Имя:</span>
        <span class="value" th:text="${user.firstName}">Имя</span>
    </div>

    <div class="info-group">
        <span class="label">Фамилия:</span>
        <span class="value" th:text="${user.lastName}">Фамилия</span>
    </div>

    <div class="info-group">
        <span class="label">Email / Логин:</span>
        <span class="value" th:text="${user.email}">Email</span>
    </div>

    <div class="info-group">
        <span class="label">Возраст:</span>
        <span class="value" th:text="${user.age}">Возраст</span>
    </div>

    <div class="info-group">
        <span class="label">Ваши роли:</span>
        <div class="value">
            <!-- Показываем только роли, начинающиеся с ROLE_ (убираем FACTOR_PASSWORD) -->
            <span th:each="role : ${user.roles}"
                  th:if="${role.name.startsWith('ROLE_')}"
                  class="roles-badge"
                  th:text="${role.name.replace('ROLE_', '')}">USER</span>
        </div>
    </div>

    <div class="actions">
        <!-- Кнопка "Назад" - доступна ТОЛЬКО пользователям с ролью ADMIN -->
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/users}" class="btn-back">
            ← Назад ко всем пользователям
        </a>

        <!-- Кнопка выхода - доступна ВСЕМ -->
        <form th:action="@{/logout}" method="POST" style="width: 100%;">
            <button type="submit" class="btn-logout">Выйти из системы</button>
        </form>
    </div>
</div>

</body>
</html>
